<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head">
        <meta charset="UTF-8">
        <title>NissiCrochet</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body class="d-flex flex-column min-vh-100">
        <header th:fragment="header" class="p-3 bg-dark text-white">
            <div class="container">
                <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                    <a th:href="@{/}" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                        <span class="fs-4 fw-bold text-info">NissiCrochet</span>
                    </a>

                    <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0 ms-4">
                        <li><a th:href="@{/}" class="nav-link px-2 text-white">Inicio</a></li>

                        <li>
                            <a th:href="@{/categoria/listado}" class="nav-link px-2 text-white">
                                Categorías
                            </a>
                        </li>

                        <li><a th:href="@{/producto/listado}" class="nav-link px-2 text-white">Productos</a></li>
                        <li><a th:href="@{/}" class="nav-link px-2 text-white">Contacto</a></li>
                    </ul>


                    <div class="d-flex align-items-center gap-3 ms-auto">

                        <a th:href="@{/carrito/listado}" class="text-white text-decoration-none position-relative p-2" title="Ver mi carrito">
                            <i class="fas fa-shopping-cart fa-lg"></i>
                            <span th:if="${items != null and !items.empty}" 
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" 
                                  style="font-size: 0.6rem; transform: translate(-30%, -30%);">
                                [[${items.size()}]]
                            </span>
                        </a>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-light btn-sm rounded-pill px-3 Login">Login</button>
                            <button type="button" class="btn btn-info btn-sm rounded-pill px-3 Registro">Registro</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <footer th:fragment="footer" class="flex-grow-1 py-3 my-4 border-top">
            <div class="container d-flex flex-wrap justify-content-between align-items-center">
                <div class="col-md-4 d-flex align-items-center">
                    <span class="mb-3 mb-md-0 text-muted">
                        &copy; 2026 NissiCrochet - CR
                    </span>
                </div>

                <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
                    <li class="ms-3"><a class="text-muted" href="#"><i class="fab fa-facebook"></i></a></li>
                    <li class="ms-3"><a class="text-muted" href="#"><i class="fab fa-instagram"></i></a></li>
                    <li class="ms-3"><a class="text-muted" href="#"><i class="fab fa-whatsapp"></i></a></li>
                </ul>

            </div>
        </footer>


        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
