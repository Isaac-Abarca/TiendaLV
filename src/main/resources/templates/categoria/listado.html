<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{General/fragmentos :: header}"></header>

        <div class="container mt-5">
            <div class="row mb-4">
                <div class="col">
                    <h2>Gestión de Categorías</h2>
                    <div class="row mb-3">
                        <div class="col">
                            <div class="btn-group" role="group">
                                <a th:href="@{/categoria/listado(filtro='todos')}" 
                                   th:class="${filtroActual == 'todos' ? 'btn btn-dark' : 'btn btn-outline-dark'}">Todos</a>

                                <a th:href="@{/categoria/listado(filtro='activos')}" 
                                   th:class="${filtroActual == 'activos' ? 'btn btn-success' : 'btn btn-outline-success'}">Activos</a>

                                <a th:href="@{/categoria/listado(filtro='inactivos')}" 
                                   th:class="${filtroActual == 'inactivos' ? 'btn btn-secondary' : 'btn btn-outline-secondary'}">Inactivos</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col text-end">
                    <button type="button" class="btn btn-primary" onclick="abrirModal()">
                        <i class="fas fa-plus"></i> Nueva Categoría
                    </button>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <div th:if="${categorias == null or categorias.isEmpty()}" 
                         class="alert alert-warning text-center">
                        <i class="fas fa-exclamation-circle"></i> No se encontraron categorías con el filtro seleccionado.
                    </div>
                    <table class="table table-striped table-hover" th:unless="${categorias == null or categorias.isEmpty()}">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Descripción</th>
                                <th>Imagen</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat, contador : ${categorias}">
                                <td>[[${contador.count}]]</td>
                                <td>[[${cat.descripcion}]]</td>
                                <td>
                                    <img th:src="${cat.rutaImagen}" alt="img" style="width: 50px; height: 50px; object-fit: cover;">
                                </td>
                                <td>
                                    <span th:class="${cat.activo ? 'badge bg-success' : 'badge bg-danger'}">
                                        [[${cat.activo ? 'Activo' : 'Inactivo'}]]
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/categoria/eliminar/}+${cat.idCategoria}" class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                    <button type="button" class="btn btn-warning btn-sm"
                                            th:onclick="abrirModal([[${cat.idCategoria}]], [[${cat.descripcion}]], [[${cat.rutaImagen}]], [[${cat.activo}]])">
                                        <i class="fas fa-pencil-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer th:replace="~{General/fragmentos :: footer}"></footer>

        <div class="modal fade" id="modalCategoria" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title" id="modalTitulo">Agregar Nueva Categoría</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <form th:action="@{/categoria/guardar}" method="POST">
                        <input type="hidden" name="idCategoria" id="id_categoria" />

                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="desc" class="form-label">Descripción</label>
                                <input type="text" name="descripcion" id="desc" class="form-control" required />
                            </div>

                            <div class="mb-3">
                                <label for="ruta" class="form-label">URL de la Imagen</label>
                                <input type="text" name="rutaImagen" id="ruta" class="form-control" />
                            </div>

                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="activo" id="esta_activo" />
                                <label class="form-check-label" for="esta_activo">¿Está activa?</label>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="submit" id="btnGuardar" class="btn btn-success">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function abrirModal(id, descripcion, ruta, activo) {
                const titulo = document.getElementById('modalTitulo');
                const boton = document.getElementById('btnGuardar');

                if (id) {
                    // MODO EDICIÓN
                    titulo.innerText = "Editar Categoría #" + id;
                    titulo.parentElement.classList.replace('bg-dark', 'bg-info'); // Cambia color de cabecera
                    boton.innerText = "Actualizar Cambios";
                    boton.classList.replace('btn-success', 'btn-info');

                    // Llenar campos
                    document.getElementById('id_categoria').value = id;
                    document.getElementById('desc').value = descripcion;
                    document.getElementById('ruta').value = ruta;
                    document.getElementById('esta_activo').checked = activo;
                } else {
                    // MODO NUEVA
                    titulo.innerText = "Agregar Nueva Categoría";
                    titulo.parentElement.classList.replace('bg-info', 'bg-dark');
                    boton.innerText = "Guardar Categoría";
                    boton.classList.replace('btn-info', 'btn-success');

                    // Limpiar campos
                    document.getElementById('id_categoria').value = "";
                    document.getElementById('desc').value = "";
                    document.getElementById('ruta').value = "";
                    document.getElementById('esta_activo').checked = true;
                }

                // Mostrar modal
                new bootstrap.Modal(document.getElementById('modalCategoria')).show();
            }
        </script>
    </body>
</html>
